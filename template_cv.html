<!DOCTYPE html>
<html lang="$lang$">
  <head>
    <meta charset="UTF-8" />
    <title>CV – Yuliam Rivera</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700;800&display=swap');

      /* =====================
     PRINT / PAGE
  ===================== */
      @page {
        size: A4;
        margin: 10mm;
      }

      :root {
        --ink: #172033;
        --text: #243044;
        --muted: #526176;
        --subtle: #6b7890;
        --line: #dbe2ea;
        --accent: #087f8c;
        --accent-strong: #0a6472;
        --accent-soft: #e9f7f8;
        --accent-warm: #c27a22;
        --accent-warm-soft: #fff4e4;
        --paper: #ffffff;
        --shadow: rgba(15, 23, 42, 0.1);
        --bg: #eef3f6;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Source Sans 3', -apple-system,
          BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 11.2px;
        line-height: 1.42;
        color: var(--text);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      .cv {
        position: relative;
        width: 210mm;
        min-height: 297mm;
        margin: 12mm auto;
        padding: 13mm 14mm 12mm 15mm;
        background: var(--paper);
        box-shadow: 0 22px 60px var(--shadow);
        border-radius: 6px;
        overflow: hidden;
      }

      .cv::before {
        content: '';
        position: absolute;
        inset: 0 auto 0 0;
        width: 5mm;
        background: linear-gradient(180deg, var(--accent) 0%, var(--accent-warm) 100%);
      }

      @media print {
        body {
          background: var(--paper);
        }

        .cv {
          width: auto;
          min-height: auto;
          padding: 0;
          max-width: none;
          margin: 0;
          box-shadow: none;
          border: none;
        }
      }

      /* =====================
     LINKS (ATS SAFE)
  ===================== */
      a {
        color: var(--accent-strong);
        text-decoration: underline;
        text-decoration-color: rgba(20, 58, 107, 0.3);
        text-underline-offset: 2px;
      }

      /* =====================
      HEADER
   ===================== */
      .cv-content {
        position: relative;
        z-index: 1;
      }

      .cv-header-photo {
        position: absolute;
        top: 12mm;
        right: 14mm;
        z-index: 2;
      }

      @media print {
        .cv-header-photo {
          top: 0;
          right: 0;
        }
      }

      .cv-header-photo img {
        width: 26mm;
        height: 26mm;
        object-fit: cover;
        border-radius: 50%;
        border: 2px solid var(--paper);
        outline: 2px solid var(--accent);
        box-shadow: 0 8px 18px rgba(8, 127, 140, 0.18);
      }

      .cv-content h1:first-of-type {
        max-width: 140mm;
        font-size: 25px;
        font-weight: 800;
        letter-spacing: 0;
        line-height: 1.05;
        margin: 0 0 4px 0;
        color: var(--ink);
      }

      .cv-content > p:first-of-type {
        max-width: 142mm;
        font-size: 11.5px;
        color: var(--muted);
        line-height: 1.35;
        margin: 0 0 10px 0;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--line);
      }

      .cv-content > h2:first-of-type {
        margin-top: 11px;
      }

      @media screen and (max-width: 580px) {
        .cv {
          width: auto;
          min-height: auto;
          margin: 0;
          padding: 18px 18px 24px 24px;
          border-radius: 0;
        }

        .cv-header-photo {
          position: static;
          margin: 0 0 12px auto;
          width: max-content;
        }

        .cv-content h1:first-of-type,
        .cv-content > p:first-of-type {
          max-width: none;
        }
      }

      /* =====================
      SECTIONS
   ===================== */
      h2 {
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.9px;
        margin: 14px 0 7px 0;
        padding: 0 0 4px 0;
        border-bottom: 1px solid var(--line);
        color: var(--accent-strong);
      }

      h3 {
        font-size: 12.2px;
        font-weight: 800;
        margin: 0 0 2px 0;
        color: var(--ink);
      }

      .job-meta {
        font-size: 11px;
        color: var(--subtle);
        margin-bottom: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .job-meta .company {
        font-weight: 600;
        color: var(--accent);
      }

      .job-meta .dates {
        color: var(--muted);
      }

      p {
        margin: 0 0 5px 0;
        font-size: 11.2px;
        line-height: 1.42;
      }

      strong {
        color: var(--ink);
        font-weight: 600;
      }

      /* =====================
      LISTS & ITEMS
   ===================== */
      ul {
        margin: 4px 0 8px 0;
        padding-left: 15px;
      }

      li {
        margin-bottom: 3px;
        padding-left: 2px;
        font-size: 11px;
        line-height: 1.35;
      }

      li::marker {
        color: var(--accent-warm);
        font-size: 8px;
      }

      /* =====================
      SKILLS / TAGS
   ===================== */
      .skills-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin: 8px 0 16px 0;
      }

      .skill-tag {
        display: inline-block;
        font-size: 10.5px;
        font-weight: 500;
        padding: 4px 10px;
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: 14px;
        color: var(--text);
      }

      .skill-tag.highlight {
        background: var(--accent-soft);
        border-color: var(--accent);
        color: var(--accent-strong);
      }

      /* =====================
      HIGHLIGHTS & ACCENTS
   ===================== */
      em {
        font-style: normal;
        color: var(--ink);
        font-weight: 600;
        background: transparent;
        padding: 0;
      }

      /* =====================
     PRINT CONTROL
  ===================== */
      h2,
      h3,
      p,
      ul,
      li {
        break-inside: avoid;
        page-break-inside: avoid;
      }

      /* =====================
      FOOTER
   ===================== */
      .cv-footer {
        margin-top: 24px;
        padding-top: 12px;
        font-size: 10px;
        color: var(--subtle);
        border-top: 1px dashed var(--line);
        text-align: center;
        letter-spacing: 0.3px;
      }

      /* =====================
      DIVIDERS
   ===================== */
      hr {
        border: none;
        height: 1px;
        background: var(--line);
        margin: 10px 0;
        opacity: 0.75;
      }
    </style>
  </head>

  <body>
    <main class="cv">
      <div class="cv-header-photo">
        <img src="../images/picture_profile.png" alt="Foto de perfil" />
      </div>
      <article class="cv-content">$body$</article>
    </main>
  </body>
</html>
