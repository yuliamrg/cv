<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>CV – Yuliam Rivera</title>
    <style>
      /* =====================
         BASE / PRINT
      ===================== */
      @page {
        margin: 16mm 14mm;
      }

      :root {
        --text: #111827;
        --muted: #4b5563;
        --subtle: #6b7280;
        --line: #e5e7eb;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 12.2px;
        line-height: 1.45;
        color: var(--text);
        background: #ffffff;
      }

      .cv {
        max-width: 860px;
        margin: 0 auto;
        padding: 18mm 14mm;
        position: relative;
      }

      @media print {
        .cv {
          padding: 0;
          max-width: none;
        }
      }

      /* =====================
         LINKS
      ===================== */
      a {
        color: inherit;
        text-decoration: underline;
        text-decoration-color: rgba(17, 24, 39, 0.25);
        text-underline-offset: 2px;
      }

      /* =====================
         HEADER AUTOMÁTICO
         (primer bloque del body)
      ===================== */

      /* Nombre */
      .cv h1:first-of-type {
        font-size: 22px;
        line-height: 1.15;
        margin: 0 0 6px 0;
        letter-spacing: 0.2px;
      }

      /* Contacto (primer párrafo después del h1) */
      .cv h1:first-of-type + p {
        font-size: 11.5px;
        color: var(--muted);
        margin: 0 0 4px 0;
        padding-right: 130px;
      }

      /* Keywords (segundo párrafo opcional) */
      .cv h1:first-of-type + p + p {
        font-size: 11px;
        color: var(--subtle);
        margin: 0 0 12px 0;
        padding-right: 130px;
      }

      /* Línea separadora bajo el header */
      .cv h1:first-of-type + p + p,
      .cv h1:first-of-type + p {
        border-bottom: 1px solid var(--line);
        padding-bottom: 10px;
      }

      /* =====================
         FOTO
      ===================== */
      .cv-header {
        display: grid;
        grid-template-columns: 1fr 120px;
        column-gap: 16px;
        align-items: start;
        margin-bottom: 10px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 10px;
      }

      .cv-header-text h1 {
        font-size: 22px;
        line-height: 1.15;
        margin: 0 0 6px 0;
        letter-spacing: 0.2px;
      }

      .cv-header-text p {
        font-size: 11.5px;
        color: var(--muted);
        margin: 0 0 4px 0;
      }

      .cv-header-photo img {
        width: 110px;
        height: 110px;
        object-fit: cover;
        border-radius: 10px;
      }

      @media screen and (max-width: 520px) {
        .profile-photo {
          position: static;
          margin-bottom: 10px;
        }

        .cv h1:first-of-type,
        .cv h1:first-of-type + p,
        .cv h1:first-of-type + p + p {
          padding-right: 0;
        }
      }

      /* =====================
         SECCIONES
      ===================== */
      h2 {
        font-size: 13px;
        margin: 16px 0 8px 0;
        padding-top: 10px;
        border-top: 1px solid var(--line);
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }

      h3 {
        font-size: 12.2px;
        margin: 0 0 3px 0;
      }

      p {
        margin: 0 0 6px 0;
      }

      ul {
        margin: 6px 0 8px 0;
        padding-left: 18px;
      }

      li {
        margin-bottom: 4px;
      }

      /* =====================
         BLOQUES / PDF
      ===================== */
      h2,
      h3,
      ul,
      li {
        break-inside: avoid;
        page-break-inside: avoid;
      }

      /* =====================
         FOOTER
      ===================== */
      .cv-footer {
        margin-top: 14px;
        font-size: 10.5px;
        color: var(--subtle);
        border-top: 1px solid var(--line);
        padding-top: 6px;
      }
    </style>
  </head>

  <body>
    <main class="cv">
      <header class="cv-header">
        <div class="cv-header-text">$body$</div>

        <div class="cv-header-photo">
          <img src="../images/picture_profile.jpeg" alt="Foto de perfil" />
        </div>
      </header>
    </main>
  </body>
</html>
