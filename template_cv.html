<!DOCTYPE html>
<html lang="$lang$">
  <head>
    <meta charset="UTF-8" />
    <title>CV – Yuliam Rivera</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

      /* =====================
     PRINT / PAGE
  ===================== */
      @page {
        margin: 16mm 14mm;
      }

      :root {
        --ink: #0f172a;
        --text: #1e293b;
        --muted: #475569;
        --subtle: #64748b;
        --line: #e2e8f0;
        --accent: #0d9488;
        --accent-strong: #0f766e;
        --accent-soft: #f0fdfa;
        --paper: #ffffff;
        --shadow: rgba(15, 23, 42, 0.1);
        --bg: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Source Sans 3', 'IBM Plex Sans', -apple-system,
          BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 12.6px;
        line-height: 1.6;
        color: var(--text);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      .cv {
        max-width: 820px;
        margin: 24mm auto 28mm auto;
        padding: 28mm 32mm;
        background: var(--paper);
        box-shadow: 0 20px 50px var(--shadow);
        border-radius: 4px;
      }

      @media print {
        body {
          background: var(--paper);
        }

        .cv {
          padding: 0;
          max-width: none;
          margin: 0;
          box-shadow: none;
          border: none;
        }
      }

      /* =====================
     LINKS (ATS SAFE)
  ===================== */
      a {
        color: var(--accent-strong);
        text-decoration: underline;
        text-decoration-color: rgba(20, 58, 107, 0.3);
        text-underline-offset: 2px;
      }

      /* =====================
      HEADER
   ===================== */
      .cv-header {
        display: flex;
        gap: 24px;
        align-items: flex-start;
        margin-bottom: 20px;
      }

      .cv-header-text {
        flex: 1;
      }

      .cv-header-photo {
        flex-shrink: 0;
      }

      .cv-header-photo img {
        width: 110px;
        height: 110px;
        object-fit: cover;
        border-radius: 50%;
        border: 3px solid var(--accent-soft);
        box-shadow: 0 6px 16px rgba(13, 148, 136, 0.15);
      }

      .cv-header-text h1:first-of-type {
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.3px;
        line-height: 1.2;
        margin: 0 0 10px 0;
        color: var(--ink);
        padding-bottom: 12px;
        border-bottom: 3px solid var(--accent);
        display: inline-block;
      }

      .cv-header-text > p:first-of-type {
        font-size: 11.5px;
        color: var(--muted);
        line-height: 1.6;
        margin: 0 0 20px 0;
      }

      .cv-header-text > h2:first-of-type {
        margin-top: 24px;
      }

      @media screen and (max-width: 580px) {
        .cv-header {
          flex-direction: column;
          align-items: center;
          text-align: center;
        }
      }

      /* =====================
      SECTIONS
   ===================== */
      h2 {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        margin: 26px 0 14px 0;
        padding: 10px 16px;
        background: linear-gradient(90deg, var(--accent-soft) 0%, transparent 100%);
        border-left: 3px solid var(--accent);
        color: var(--accent-strong);
        border-radius: 0 6px 6px 0;
      }

      h3 {
        font-size: 13px;
        font-weight: 600;
        margin: 0 0 4px 0;
        color: var(--ink);
      }

      .job-meta {
        font-size: 11px;
        color: var(--subtle);
        margin-bottom: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .job-meta .company {
        font-weight: 600;
        color: var(--accent);
      }

      .job-meta .dates {
        color: var(--muted);
      }

      p {
        margin: 0 0 8px 0;
        font-size: 12px;
        line-height: 1.65;
      }

      strong {
        color: var(--ink);
        font-weight: 600;
      }

      /* =====================
      LISTS & ITEMS
   ===================== */
      ul {
        margin: 8px 0 12px 0;
        padding-left: 20px;
      }

      li {
        margin-bottom: 6px;
        padding-left: 4px;
        font-size: 12px;
        line-height: 1.6;
      }

      li::marker {
        color: var(--accent);
        font-size: 8px;
      }

      /* =====================
      SKILLS / TAGS
   ===================== */
      .skills-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin: 8px 0 16px 0;
      }

      .skill-tag {
        display: inline-block;
        font-size: 10.5px;
        font-weight: 500;
        padding: 4px 10px;
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: 14px;
        color: var(--text);
      }

      .skill-tag.highlight {
        background: var(--accent-soft);
        border-color: var(--accent);
        color: var(--accent-strong);
      }

      /* =====================
      HIGHLIGHTS & ACCENTS
   ===================== */
      em {
        font-style: normal;
        color: var(--accent-strong);
        font-weight: 600;
        background: var(--accent-soft);
        padding: 1px 4px;
        border-radius: 3px;
      }

      /* =====================
     PRINT CONTROL
  ===================== */
      h2,
      h3,
      p,
      ul,
      li {
        break-inside: avoid;
        page-break-inside: avoid;
      }

      /* =====================
      FOOTER
   ===================== */
      .cv-footer {
        margin-top: 24px;
        padding-top: 12px;
        font-size: 10px;
        color: var(--subtle);
        border-top: 1px dashed var(--line);
        text-align: center;
        letter-spacing: 0.3px;
      }

      /* =====================
      DIVIDERS
   ===================== */
      hr {
        border: none;
        height: 1px;
        background: linear-gradient(90deg, var(--line) 0%, var(--accent) 50%, var(--line) 100%);
        margin: 20px 0;
        opacity: 0.5;
      }
    </style>
  </head>

  <body>
    <main class="cv">
      <header class="cv-header">
        <div class="cv-header-text">$body$</div>

        <div class="cv-header-photo">
          <img src="../images/picture_profile.png" alt="Foto de perfil" />
        </div>
      </header>
    </main>
  </body>
</html>
